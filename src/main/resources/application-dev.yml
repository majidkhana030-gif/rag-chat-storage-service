server:
  port: ${SERVER_PORT:8081}

app:
  security:
    api-key: ${API_KEY}

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

  endpoint:
    health:
      show-details: always

  springdoc:
    api-docs:
      enabled: true
    swagger-ui:
      enabled: true
